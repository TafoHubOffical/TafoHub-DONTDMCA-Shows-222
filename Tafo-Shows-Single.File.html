<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tafo Shows</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100%;background:#04060a;overflow-x:hidden;overflow-y:auto}

body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#0a1428 0%,#04060a 70%);z-index:0;pointer-events:none}

.scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,10,40,0.2) 2px,rgba(0,10,40,0.2) 4px);z-index:1;pointer-events:none;opacity:0.5}

#hdr{position:sticky;top:0;z-index:50;padding:22px 0 18px;text-align:center;background:linear-gradient(180deg,#04060a 60%,transparent);border-bottom:1px solid rgba(100,150,255,0.1)}
#hdr h1{font-family:'Orbitron',sans-serif;font-size:clamp(20px,5vw,38px);font-weight:900;letter-spacing:10px;color:#fff;text-transform:uppercase;text-shadow:0 0 30px rgba(100,150,255,0.4),0 0 60px rgba(100,150,255,0.2)}
#hdr .sub{font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:5px;color:rgba(150,180,255,0.4);text-transform:uppercase;margin-top:4px}

.mainContainer{position:relative;z-index:2;display:flex;flex-wrap:wrap;justify-content:center;gap:24px;padding:36px 20px 60px}

.boxContainer{width:280px;border-radius:4px;cursor:pointer;background:#080b12;border:1px solid rgba(100,150,255,0.15);transition:all 0.4s cubic-bezier(0.23,1,0.32,1);position:relative;overflow:hidden}
.boxContainer::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(100,150,255,0.05) 0%,transparent 50%);z-index:1;pointer-events:none}
.boxContainer:hover{transform:translateY(-8px) scale(1.01);border-color:rgba(150,200,255,0.6);box-shadow:0 20px 60px rgba(0,0,0,0.9),0 0 20px rgba(100,150,255,0.2),inset 0 1px 0 rgba(255,255,255,0.1)}
.boxContainer:hover .imgWrap img{transform:scale(1.04);filter:grayscale(0%)}
.boxContainer:hover .imgOverlay{opacity:1}

.imgWrap{width:100%;height:400px;overflow:hidden;position:relative;background:#000}
.imgWrap img{width:100%;height:100%;object-fit:cover;transition:transform 0.6s cubic-bezier(0.23,1,0.32,1);filter:grayscale(25%) contrast(1.1)}
.imgOverlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(4,6,10,0.8));opacity:0;transition:opacity 0.4s;display:flex;align-items:flex-end;justify-content:center;padding-bottom:12px}
.imgOverlay span{font-family:'Rajdhani',sans-serif;letter-spacing:3px;font-size:11px;color:rgba(200,220,255,0.9);text-transform:uppercase}

.boxTitle{padding:14px 16px 16px;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;letter-spacing:2px;color:rgba(255,255,255,0.9);text-transform:uppercase;border-top:1px solid rgba(100,150,255,0.1);display:flex;justify-content:space-between;align-items:center}
.boxTitle::after{content:'→';font-size:14px;color:rgba(100,150,255,0.4);transition:transform 0.3s,color 0.3s}
.boxContainer:hover .boxTitle::after{transform:translateX(4px);color:#fff}

.overlay{position:fixed;inset:0;background:rgba(2,4,8,0.96);display:none;justify-content:center;align-items:center;z-index:150;opacity:0;transition:opacity 0.4s ease;backdrop-filter:blur(15px)}
.overlay.show{display:flex;opacity:1}

.modalBox{background:#080b12;border:1px solid rgba(100,150,255,0.2);border-radius:4px;padding:28px;width:min(640px,94vw);max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 0 50px rgba(0,0,0,0.5);transform:scale(0.9);transition:transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)}
.overlay.show .modalBox{transform:scale(1)}

.modalBox h2{font-family:'Orbitron',sans-serif;font-size:clamp(13px,3vw,17px);font-weight:600;letter-spacing:4px;color:#fff;text-transform:uppercase;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid rgba(100,150,255,0.1)}

.seasonGrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}

.seasonPosterBtn{position:relative;background:#04060a;border:1px solid rgba(100,150,255,0.15);border-radius:4px;cursor:pointer;overflow:hidden;transition:all 0.3s;padding:0;display:flex;flex-direction:column}
.seasonPosterBtn img{width:100%;height:260px;object-fit:cover;filter:grayscale(40%);transition:all 0.4s}
.seasonPosterBtn span{display:block;padding:12px 14px;color:rgba(200,220,255,0.7);font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;border-top:1px solid rgba(100,150,255,0.1)}
.seasonPosterBtn:hover{border-color:rgba(150,200,255,0.5);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.8)}
.seasonPosterBtn:hover img{filter:grayscale(0%);transform:scale(1.03)}

.menuBtn{display:flex;align-items:center;gap:12px;width:100%;margin:6px 0;padding:13px 16px;background:transparent;color:rgba(200,220,255,0.7);border-radius:3px;cursor:pointer;transition:all 0.2s;text-align:left;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:400;letter-spacing:1px;border:1px solid rgba(100,150,255,0.1)}
.menuBtn .epNum{font-family:'Orbitron',sans-serif;font-size:10px;color:rgba(100,150,255,0.4);min-width:28px}
.menuBtn:hover{background:rgba(100,150,255,0.08);color:#fff;border-color:rgba(150,200,255,0.4);padding-left:22px}

.actionBtn{margin-top:24px;padding:14px;width:100%;border:1px solid rgba(100,150,255,0.3);background:transparent;color:rgba(200,220,255,0.8);cursor:pointer;border-radius:3px;font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;transition:all 0.3s}
.actionBtn:hover{background:#fff;color:#000;border-color:#fff}

#theaterMode{position:fixed;inset:0;background:#000;z-index:200;display:none;opacity:0;transition:opacity 0.5s ease;flex-direction:column;justify-content:center;align-items:center}
#theaterMode.active{display:flex;opacity:1}
#theaterMode iframe{width:90%;height:80%;border:2px solid rgba(100,150,255,0.2);box-shadow:0 0 50px rgba(0,0,0,1);border-radius:8px;transform:scale(0.85);transition:transform 0.5s cubic-bezier(0.23, 1, 0.32, 1)}
#theaterMode.active iframe{transform:scale(1)}

.closeX{position:absolute;top:30px;right:40px;width:50px;height:50px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:50%;cursor:pointer;display:flex;justify-content:center;align-items:center;font-family:'Orbitron',sans-serif;font-size:20px;transition:all 0.3s;z-index:210}
.closeX:hover{background:#fff;color:#000;transform:rotate(90deg);box-shadow:0 0 20px #fff}

.particle{position:fixed;width:1px;height:1px;background:#6496ff;border-radius:50%;opacity:0;animation:rise linear infinite;z-index:0}
@keyframes rise{0%{transform:translateY(100vh);opacity:0}10%{opacity:0.4}90%{opacity:0.2}100%{transform:translateY(-10vh);opacity:0}}
</style>
</head>
<body>
<div class="scanlines"></div>
<div id="hdr"><h1>Tafo Shows</h1><div class="sub">Midnight Blue Edition</div></div>

<div class="mainContainer">
  <div id="box1" class="boxContainer"><div class="imgWrap"><img src="https://drive.google.com/thumbnail?id=12enL_F71tGO-fXO41zA3YV1-aq3pikpy&sz=w1000"><div class="imgOverlay"><span>View Seasons</span></div></div><div class="boxTitle">Stranger Things</div></div>
  <div id="box2" class="boxContainer"><div class="imgWrap"><img src="https://drive.google.com/thumbnail?id=19cgiEx3W0uhgTE-tchHmy61lhQAWvUu4&sz=w1000"><div class="imgOverlay"><span>View Seasons</span></div></div><div class="boxTitle">It: Welcome To Derry</div></div>
  <div id="box3" class="boxContainer"><div class="imgWrap"><img src="https://raw.githubusercontent.com/TafoHubOffical/TafoHub-DONTDMCA-MovieCover-222/refs/heads/main/Jujutsu%20kaisen%20Season%203%20The%20Culling%20Games.jpeg"><div class="imgOverlay"><span>View Seasons</span></div></div><div class="boxTitle">Jujutsu Kaisen</div></div>
</div>

<div id="episodeOverlay" class="overlay">
  <div class="modalBox" id="episodeBox">
    <h2 id="modalTitle">Select Season</h2>
    <div id="menuList"></div>
    <button id="closeBtn" class="actionBtn">Close</button>
  </div>
</div>

<div id="theaterMode">
    <button class="closeX" id="exitTheater">X</button>
    <iframe id="videoFrame" src="" allowfullscreen></iframe>
</div>

<script>
const overlay=document.getElementById("episodeOverlay"),menuList=document.getElementById("menuList"),modalTitle=document.getElementById("modalTitle"),closeBtn=document.getElementById("closeBtn");
const theater=document.getElementById("theaterMode"),vFrame=document.getElementById("videoFrame"),exitTheater=document.getElementById("exitTheater");
let currentShowData=null,currentShowName="";

const stData=[
  {seasonName:"Season 5",poster:"https://drive.google.com/thumbnail?id=12enL_F71tGO-fXO41zA3YV1-aq3pikpy&sz=w1000",episodes:[{title:"The Crawl",link:"https://drive.google.com/file/d/1c56jdsr-FC87qGVfZATOU4HNcA2cpLh/view"},{title:"The Vanishing of Holly Wheeler",link:"https://drive.google.com/file/d/12ttGGMfSo_Tv3iBZN2kEZJGOFmFJNii8/view"},{title:"The Turnbow Trap",link:"https://drive.google.com/file/d/1RvrqxoCClsWHqJAv_Qegrp36RnsKvHH5/view"},{title:"Sorcerer",link:"https://drive.google.com/file/d/1ptTP0L34yBOtqvXHqsDbSjIGAuA3DXwW/view"},{title:"Shock Jock",link:"https://drive.google.com/file/d/1KUHKdouvdfiZhaAzhYKV1oiHpvPyeQ0I/view"},{title:"Escape from Camazotz",link:"https://drive.google.com/file/d/1McrBSgcPJjY4EIQuEic94TZdNg0v4eNh/view"},{title:"The Bridge",link:"https://drive.google.com/file/d/1LccPcnp68YdyJ7q44Mbc6PgVqsfpCl56/view"},{title:"The Rightside Up",link:"https://drive.google.com/file/d/14EyEJoqw67ttQIuWLaHwdc8Y6yjyyj43/view"}]},
  {seasonName:"Season 3",poster:"https://drive.google.com/thumbnail?id=155v7sFRco_tV2anr57g7EgB_vYJ-hawp&sz=w1000",episodes:[{title:"Episode 1",link:"#"},{title:"Episode 2",link:"#"},{title:"Episode 3",link:"#"},{title:"Episode 4",link:"#"},{title:"Episode 5",link:"#"},{title:"Episode 6",link:"#"},{title:"Episode 7",link:"#"},{title:"Episode 8",link:"#"}]}
];

const derryData=[{seasonName:"Season 1",poster:"https://drive.google.com/thumbnail?id=19cgiEx3W0uhgTE-tchHmy61lhQAWvUu4&sz=w1000",episodes:[{title:"The Pilot",link:"https://drive.google.com/file/d/1DcKPBEtUK6CQB0ln04TvKKMbwPRaSKXy/view"},{title:"The Thing In The Dark",link:"https://drive.google.com/file/d/145V4hGW5wG2Gw_M5GKEoix69juIpCqFG/view"},{title:"Now You See It",link:"https://drive.google.com/file/d/10X1TKNRnHVizernInA9GOP5TZVMStlty/view"},{title:"The Great Swirling Apparatus of Our Planet's Function",link:"https://drive.google.com/file/d/1HSZQbc_Kb1PfUiOr23BkgLSwZs43QAWD/view"},{title:"29 Neibolt Street",link:"https://drive.google.com/file/d/1u5XYCISOVu0KZ0D9AvsO4RbKxXOCyUzc/view"},{title:"In The Name Of The Father",link:"https://drive.google.com/file/d/1ua9j2JUuTlGtQ2Gd6AvlPR2zenm2U0LP/view"},{title:"The Black Spot",link:"https://drive.google.com/file/d/13488v45i6Wpnb8t9ZRZ0iVYRXnuQQDl6/view"},{title:"Winter Fire",link:"https://drive.google.com/file/d/1tcl6l2R9z-vcxxlgS4ZvW9KCpHRbJLAc/view"}]}];

const jjkData=[
  {seasonName:"jujutsu kaisen season 3 The Culling Games Part 1",poster:"https://raw.githubusercontent.com/TafoHubOffical/TafoHub-DONTDMCA-MovieCover-222/refs/heads/main/Jujutsu%20kaisen%20Season%203%20The%20Culling%20Games.jpeg",episodes:[
    {title:"EXECUTION",link:"https://drive.google.com/file/d/1AO49Aw86E_hUWJgHDdF0QTotYNIae-xP/view"},
    {title:"ONE MORE TIME",link:"https://drive.google.com/file/d/1hTccB7qc18zWnl3pY-kWyg_VDvQyTyQ2/view"},
    {title:"ABOUT THE CULLING GAME",link:"https://drive.google.com/file/d/1Y2w192o4Vc9xrq7zSeDF4IO2QEliEUzx/view"},
    {title:"PERFECT PREPARATION",link:"https://drive.google.com/file/d/1m19Dz8eepClzgR20e5ngBZ7o8_5zMlNj/view"},
    {title:"FEVER",link:"https://drive.google.com/file/d/1rdESNiJWjpx44AOO74lQYsH5_dHxSxKS/view"},
    {title:"COG",link:"https://drive.google.com/file/d/1_72reNBQT3KuzI8IK-YkWwH_zWiAmS9A/view"},
    {title:"Tokyo No. 1 Colony, Part 1",link:"https://drive.google.com/file/d/1UePF1bnQXItzmaqu2TtSPHslyHcPQSql/view"},
    {title:"Tokyo No. 1 Colony, Part 2",link:"https://drive.google.com/file/d/1PhWuozLbzeDDLk7mnXbPbOgqQgL8Uj4O/view"},
    {title:"Tokyo No. 1 Colony, Part 3",link:"https://drive.google.com/file/d/1l6u23J_NgfvzuOFQjWHS_gKUm7xAczrm/view"},
    {title:"Tokyo No. 1 Colony, Part 4",link:"https://drive.google.com/file/d/1_flG13SPdg8uZPkO5-p0eX0D0vmmJxrs/view"},
    {title:"Tokyo Colony No. 1, Part 5",link:"https://drive.google.com/file/d/1EwPFPf0K3xFNmKNOWa0XE7H9vReELxWi/view"},
    {title:"Sendai Colony",link:"https://drive.google.com/file/d/1QiKYog2Bf40sWSQAzslVR6XaO0YE1NxR/view"}
  ]}
];

function repairLink(u){return(!u||u==="#")?u:u.replace(/\/view(\?usp=drivesdk)?$/,"/preview")}

function showSeasons(name,arr){
  currentShowData=arr;currentShowName=name;
  modalTitle.innerText=name;closeBtn.innerText="Close";
  menuList.innerHTML='<div class="seasonGrid" id="sGrid"></div>';
  const g=document.getElementById("sGrid");
  arr.forEach(s=>{
    const b=document.createElement("button");b.className="seasonPosterBtn";
    b.innerHTML=(s.isSoon?'<div class="comingSoonSign">Soon</div>':'')+`<img src="${s.poster}"><span>${s.seasonName}</span>`;
    b.onclick=()=>showEpisodes(name,s);g.appendChild(b);
  });
  overlay.style.display="flex";requestAnimationFrame(()=>overlay.classList.add("show"));
}

function showEpisodes(name,s){
  modalTitle.innerText=name+" — "+s.seasonName;closeBtn.innerText="← Back";menuList.innerHTML="";
  s.episodes.forEach((ep,i)=>{
    const b=document.createElement("button");b.className="menuBtn";
    b.innerHTML=`<span class="epNum">E${String(i+1).padStart(2,"0")}</span>${ep.title}`;
    b.onclick=()=>{if(ep.link==="#")return;vFrame.src=repairLink(ep.link);theater.classList.add("active")};
    menuList.appendChild(b);
  });
}

exitTheater.onclick=()=>{theater.classList.remove("active");setTimeout(()=>{vFrame.src=""},500)};
document.getElementById("box1").onclick=()=>showSeasons("Stranger Things",stData);
document.getElementById("box2").onclick=()=>showSeasons("It: Welcome To Derry",derryData);
document.getElementById("box3").onclick=()=>showSeasons("Jujutsu Kaisen",jjkData);
closeBtn.onclick=()=>{if(closeBtn.innerText==="← Back"){showSeasons(currentShowName,currentShowData)}else{overlay.classList.remove("show");setTimeout(()=>overlay.style.display="none",300)}};

for(let i=0;i<25;i++){const p=document.createElement("div");p.className="particle";p.style.cssText=`left:${Math.random()*100}vw;bottom:0;animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*10}s`;document.body.appendChild(p)}
</script>
</body>
</html>
